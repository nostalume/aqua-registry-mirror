# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: tombi-toml
    repo_name: tombi
    description: TOML Formatter / Linter / Language Server
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.3.27" || semver("<= 0.2.23")
        no_asset: true
      - version_constraint: semver("<= 0.3.37")
        url: https://gh-proxy.org/https://github.com/tombi-toml/tombi/releases/download/{{.Version}}/{{.Asset}}
        asset: tombi-cli-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: gz
        files:
          - name: tombi
            src: "{{.AssetWithoutExt}}"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
        supported_envs:
          - darwin
      - version_constraint: semver("<= 0.3.38")
        url: https://gh-proxy.org/https://github.com/tombi-toml/tombi/releases/download/{{.Version}}/{{.Asset}}
        asset: tombi-cli-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: gz
        windows_arm_emulation: true
        files:
          - name: tombi
            src: "{{.AssetWithoutExt}}"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
            files:
              - name: tombi
        supported_envs:
          - darwin
          - linux/amd64
          - windows
      - version_constraint: semver("<= 0.3.39")
        url: https://gh-proxy.org/https://github.com/tombi-toml/tombi/releases/download/{{.Version}}/{{.Asset}}
        asset: tombi-cli-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: gz
        windows_arm_emulation: true
        files:
          - name: tombi
            src: "{{.AssetWithoutExt}}"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
            files:
              - name: tombi
      - version_constraint: semver("<= 0.9.22")
        url: https://gh-proxy.org/https://github.com/tombi-toml/tombi/releases/download/{{.Version}}/{{.Asset}}
        asset: tombi-cli-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: gz
        files:
          - name: tombi
            src: "{{.AssetWithoutExt}}"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
            files:
              - name: tombi
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/tombi-toml/tombi/releases/download/{{.Version}}/{{.Asset}}
        asset: tombi-cli-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        files:
          - name: tombi
            src: "{{.AssetWithoutExt}}/tombi"
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
            files:
              - name: tombi
