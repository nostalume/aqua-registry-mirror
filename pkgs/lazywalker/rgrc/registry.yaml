# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: lazywalker
    repo_name: rgrc
    description: "rgrc - Rusty Generic Colouriser - just like grc but fast"
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.4.2"
        url: https://gh-proxy.org/https://github.com/lazywalker/rgrc/releases/download/{{.Version}}/{{.Asset}}
        asset: rgrc-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: zip
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
      - version_constraint: semver("<= 0.4.1")
        url: https://gh-proxy.org/https://github.com/lazywalker/rgrc/releases/download/{{.Version}}/{{.Asset}}
        asset: rgrc-{{trimV .Version}}-{{.Arch}}-{{.OS}}.{{.Format}}
        format: zip
        rosetta2: true
        windows_arm_emulation: true
        replacements:
          amd64: x86_64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: linux
            replacements:
              arm64: aarch64
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/lazywalker/rgrc/releases/download/{{.Version}}/{{.Asset}}
        asset: rgrc-{{.Arch}}-{{.OS}}.{{.Format}}
        format: tar.gz
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: apple-darwin
          linux: unknown-linux-musl
          windows: pc-windows-msvc
        overrides:
          - goos: windows
            format: zip
