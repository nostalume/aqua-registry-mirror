# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: ogulcancelik
    repo_name: herdr
    description: agent multiplexer that lives in your terminal
    version_constraint: "false"
    version_overrides:
      - version_constraint: Version == "v0.4.0"
        url: https://gh-proxy.org/https://github.com/ogulcancelik/herdr/releases/download/{{.Version}}/{{.Asset}}
        asset: herdr-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: macos
        supported_envs:
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/ogulcancelik/herdr/releases/download/{{.Version}}/{{.Asset}}
        asset: herdr-{{.OS}}-{{.Arch}}
        format: raw
        replacements:
          amd64: x86_64
          arm64: aarch64
          darwin: macos
        supported_envs:
          - linux
          - darwin
