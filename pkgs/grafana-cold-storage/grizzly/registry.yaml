# yaml-language-server: $schema=https://raw.githubusercontent.com/aquaproj/aqua/main/json-schema/registry.json
packages:
  - type: github_release
    repo_owner: grafana-cold-storage
    repo_name: grizzly
    aliases:
      - name: grafana/grizzly
    description: A utility for managing Jsonnet dashboards against the Grafana API
    files:
      - name: grr
    version_constraint: "false"
    version_overrides:
      - version_constraint: semver("<= 0.1.0")
        url: https://gh-proxy.org/https://github.com/grafana-cold-storage/grizzly/releases/download/{{.Version}}/{{.Asset}}
        asset: grr-{{.OS}}-{{.Arch}}
        format: raw
        rosetta2: true
        supported_envs:
          - linux
          - darwin
      - version_constraint: "true"
        url: https://gh-proxy.org/https://github.com/grafana-cold-storage/grizzly/releases/download/{{.Version}}/{{.Asset}}
        asset: grr-{{.OS}}-{{.Arch}}
        format: raw
        supported_envs:
          - linux
          - darwin
